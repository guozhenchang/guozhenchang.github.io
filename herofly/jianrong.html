			 margin 的兼容问题:
			 	1 ,子级的marginTop会传递到父级
			 		(当父级有边框时,bug消失)
			 	2 ,双倍margin值问题(父子级元素之间)
			 		在ie6/7/8下,当第一个子元素左右两边同方向上同时设置margin和float时,margin值会变成设置值的双倍.如:{margin-left:10px;float:left},此时margin-left实际效果为20px
			 	3 ,正常情况下, 同级的上下两个元素之间的margin会重叠,但如果下面的元素有浮动,margin则不会重叠
			 	
			 友情提示 : 如果可以使用padding来实现的效果,就尽量不适用margin来实现
			 */
