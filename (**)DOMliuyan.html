<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title></title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
			}
			#container{
				position: relative;
				width: 400px;
				margin: 0 auto;
				border: 1px solid #000;
				padding: 20px;
			}
			h2{
				text-align: center;
			}
			#title{
				width: 320px;
				height: 30px;
			}
			#content{
				width: 320px;
				height: 200px;
				resize: none;
			}
			#btn{
				position: absolute;
				right: 50px;
				width: 60px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<h2>留言板</h2><br />
			<span>标题 : </span><input type="text" id="title" placeholder="输入标题" /><br /><br />
			<span>内容 : </span><textarea id="content" placeholder="这个输入内容"></textarea><br /><br />
			<input type="submit" name="btn" id="btn" value="提交" /><br /><br />
			<span id="show">显示内容: </span>
			<div id="showText"></div>
		</div>
	</body>
	<script type="text/javascript">
		var cont = document.querySelector("#container");
		var title = document.querySelector("#title");
		var content = document.querySelector("#content");
		var btn = document.querySelector("#btn");
		var show = document.querySelector("#show");
		var showText = document.querySelector("#showText");
		btn.onclick = function(){
			var titleV = title.value;
			var contentV = content.value;
			if(titleV != ''&&contentV != ''){
				var newLi1 = document.createElement('li');
				var del = document.createElement('a');
				del.innerHTML = '删除';
				newLi1.innerHTML = titleV+'<br>' + contentV;
				newLi1.appendChild(del)
				showText.insertBefore(newLi1,showText.firstChild)
				title.value = '';
				content.value = '';
				del.onclick = function(){
					showText.removeChild(newLi1)
				}
			}
		}
	</script>
</html>
