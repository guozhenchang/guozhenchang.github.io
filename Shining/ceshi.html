<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title></title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
			}
			#container{
				width: 80%;
				margin: 0 auto;
			}
			#container ul{
				float: left;
				width: 23%;
				margin: 0 .5%;
				list-style: none;
			}
			li{
				width: 100%;
				margin-bottom: 10px;
			}
			img{
				width: 100%;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<ul></ul>
			<ul></ul>
			<ul></ul>
			<ul></ul>
		</div>
		
	</body>
	<script src="http://libs.baidu.com/jquery/2.0.0/jquery.min.js"></script>
	<script type="text/javascript">
		var uls = document.querySelectorAll("ul");

		var liArr = []
		for(var i = 0;i < 97;i ++){
			img = new Image()
			var li = document.createElement('li')
			img.src = "img/rendering/b000"+(i+1)+".jpg"
			li.appendChild(img)	
			liArr.push(li);
		}

			img.onload = function(){
				for(var j = 0;j < 97;j ++){
					// 创建ul高度的数组
					var ulsHeight = []
					for(var k = 0;k < uls.length;k ++){
						ulsHeight.push(uls[k].offsetHeight)
					}
					// 比较ul的高度
					var minHeight = ulsHeight[0];
					var minIndex = 0
					for(var k = 0;k <uls.length;k ++){
						if(minHeight > ulsHeight[k]){
							minHeight = ulsHeight[k]
							minIndex = k
						}
					}
					uls[minIndex].appendChild(liArr[j])
				}
			}
			

		
	</script>
</html>
